<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pwede Manguyab??</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    overscroll-behavior: none;
  }
  body {
    margin: 0;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, #ffe3ee 0%, #ffb8d2 60%, #f78fb3 100%);
    font-family: 'Segoe UI', Verdana, sans-serif;
    overflow: hidden;
    touch-action: manipulation;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    -webkit-user-select: none;
    user-select: none;
  }

  .card {
    position: relative;
    width: 92vw;
    max-width: 420px;
    height: min(70dvh, 480px);
    min-height: 380px;
    background: rgba(255,255,255,0.35);
    border-radius: 24px;
    backdrop-filter: blur(6px);
    box-shadow: 0 20px 40px rgba(200, 60, 110, 0.25);
    padding: clamp(20px, 5vw, 40px) clamp(16px, 5vw, 24px);
    text-align: center;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  h1 {
    color: #c2185b;
    font-size: clamp(1.3rem, 5.5vw, 1.8rem);
    margin: 0 0 clamp(16px, 5vh, 30px);
    line-height: 1.3;
  }

  .mascot {
    font-size: clamp(3.5rem, 15vw, 5rem);
    margin: 10px 0 clamp(16px, 5vh, 30px);
    transition: transform 0.2s ease;
    animation: bob 2s ease-in-out infinite;
  }

  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .buttons {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    height: 25dvh;
    max-height: 90px;
    min-height: 60px;
    flex-shrink: 0;
  }

  button {
    border: none;
    border-radius: 12px;
    font-size: clamp(0.95rem, 4vw, 1.1rem);
    font-weight: 700;
    padding: clamp(12px, 4vw, 16px) clamp(20px, 6vw, 28px);
    min-height: 48px;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.2s ease, left 0.2s ease, top 0.2s ease;
    touch-action: manipulation;
  }

  button:active { transform: scale(0.95); }

  #yesBtn {
    background: #43a047;
    color: white;
    position: relative;
    z-index: 1;
    transform-origin: center;
    transition: transform 0.3s cubic-bezier(.34, 1.56, .64, 1), font-size 0.3s ease, background 0.2s ease;
  }
  #yesBtn:hover { background: #388e3c; }
  #yesBtn.pop { animation: yesPop 0.35s cubic-bezier(.34, 1.56, .64, 1); }

  @keyframes yesPop {
    0%   { filter: brightness(1); }
    40%  { filter: brightness(1.25); }
    100% { filter: brightness(1); }
  }

  #noBtn {
    background: #e53935;
    color: white;
    z-index: 3;
  }
  #noBtn.roaming {
    position: absolute;
  }

  .celebrate {
    display: none;
  }

  .celebrate h1 { color: #c2185b; }
  .celebrate p { color: #ad1457; font-weight: 600; }

  .confetti {
    position: fixed;
    top: -10px;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    pointer-events: none;
    animation: fall linear forwards;
  }

  @keyframes fall {
    to {
      transform: translateY(110vh) rotate(360deg);
      opacity: 0.8;
    }
  }
</style>
</head>
<body>

<div class="card" id="card">
  <div id="askScreen">
    <h1>Pwede Ko Manguyab??💕</h1>
    <div class="mascot" id="mascot">😳</div>
    <div class="buttons" id="buttonRow">
      <button id="yesBtn">Yes</button>
      <button id="noBtn">No</button>
    </div>
  </div>

  <div id="celebrateScreen" class="celebrate">
    <h1>Yeyy knew you would say yes!🎉</h1>
    <div class="mascot">🥰</div>
    <p>You just made me the happiest person! 💕</p>
  </div>
</div>

<script>
  const noBtn = document.getElementById('noBtn');
  const yesBtn = document.getElementById('yesBtn');
  const buttonRow = document.getElementById('buttonRow');
  const card = document.getElementById('card');
  const mascot = document.getElementById('mascot');
  const askScreen = document.getElementById('askScreen');
  const celebrateScreen = document.getElementById('celebrateScreen');

  // Stages of increasingly desperate "No" button text
  const noStages = [
    "No",
    "Are you sure?",
    "Pookie please... 🥺",
    "I will be very sad... 😢",
    "Last chance! ⚠️",
    "😭"
  ];

  const mascotStages = ["😳", "😐", "🥺", "😢", "😭", "😭"];

  let stage = 0;
  let yesScale = 1;

  function moveNoButton() {
    const cardRect = card.getBoundingClientRect();
    const btnW = noBtn.offsetWidth;
    const btnH = noBtn.offsetHeight;
    const padding = 16;

    const maxX = Math.max(padding, cardRect.width - btnW - padding);
    const maxY = Math.max(padding, cardRect.height - btnH - padding);

    const randX = padding + Math.random() * (maxX - padding);
    const randY = padding + Math.random() * (maxY - padding);

    noBtn.classList.add('roaming');
    noBtn.style.left = randX + 'px';
    noBtn.style.top = randY + 'px';
  }

  function escalate() {
    if (stage < noStages.length - 1) {
      stage++;
    }
    noBtn.textContent = noStages[stage];
    mascot.textContent = mascotStages[stage];

    // Yes button grows noticeably each time, with a little pop
    yesScale = Math.min(yesScale + 0.18, 2.6);
    yesBtn.style.transform = `scale(${yesScale})`;
    yesBtn.style.fontSize = (1.1 + (yesScale - 1) * 0.6) + 'rem';
    yesBtn.classList.remove('pop');
    void yesBtn.offsetWidth; // restart animation
    yesBtn.classList.add('pop');

    moveNoButton();
  }

  noBtn.addEventListener('mouseenter', escalate);
  noBtn.addEventListener('click', (e) => {
    e.preventDefault();
    escalate();
  });
  // Touch support for mobile
  noBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    escalate();
  });

  yesBtn.addEventListener('click', () => {
    askScreen.style.display = 'none';
    celebrateScreen.style.display = 'block';
    launchConfetti();
  });

  function launchConfetti() {
    const colors = ['#e91e63', '#f06292', '#ff8a80', '#ffd54f', '#ba68c8'];
    for (let i = 0; i < 80; i++) {
      const conf = document.createElement('div');
      conf.className = 'confetti';
      conf.style.left = Math.random() * 100 + 'vw';
      conf.style.background = colors[Math.floor(Math.random() * colors.length)];
      conf.style.animationDuration = (2 + Math.random() * 2) + 's';
      conf.style.animationDelay = (Math.random() * 0.5) + 's';
      document.body.appendChild(conf);
      setTimeout(() => conf.remove(), 4500);
    }
  }
</script>

</body>
</html>
